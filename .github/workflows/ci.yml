name: CI

on:
  push:
    branches:
    - "**"
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: macos-26

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Just
      uses: extractions/setup-just@v2

    - name: Setup XcodeGen
      run: brew install xcodegen

    - name: Build project
      run: just build

    - name: Run unit and UI tests
      run: just test
