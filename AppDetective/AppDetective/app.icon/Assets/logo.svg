<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- App-store style rounded square -->
  <rect x="56" y="56" width="400" height="400" rx="88" fill="white" opacity="0.95"/>

  <!-- Inner grid of mini app icons (3x3) to suggest "apps" -->
  <rect x="120" y="110" width="72" height="72" rx="16" fill="#3B82F6" opacity="0.7"/>
  <rect x="208" y="110" width="72" height="72" rx="16" fill="#10B981" opacity="0.7"/>
  <rect x="296" y="110" width="72" height="72" rx="16" fill="#F59E0B" opacity="0.7"/>

  <rect x="120" y="198" width="72" height="72" rx="16" fill="#8B5CF6" opacity="0.7"/>
  <rect x="208" y="198" width="72" height="72" rx="16" fill="#EC4899" opacity="0.7"/>
  <rect x="296" y="198" width="72" height="72" rx="16" fill="#06B6D4" opacity="0.7"/>

  <rect x="120" y="286" width="72" height="72" rx="16" fill="#F97316" opacity="0.7"/>
  <rect x="208" y="286" width="72" height="72" rx="16" fill="#6366F1" opacity="0.7"/>
  <rect x="296" y="286" width="72" height="72" rx="16" fill="#14B8A6" opacity="0.7"/>

  <!-- Magnifying glass overlay (bottom-right) -->
  <!-- Glass shadow -->
  <circle cx="340" cy="340" r="100" fill="black" opacity="0.08"/>
  <!-- Glass body -->
  <circle cx="330" cy="330" r="88" fill="white" stroke="#1D4ED8" stroke-width="14"/>
  <!-- Glass inner highlight -->
  <circle cx="330" cy="330" r="68" fill="#EFF6FF" opacity="0.6"/>
  <!-- Glass shine -->
  <circle cx="308" cy="308" r="24" fill="white" opacity="0.5"/>
  <!-- Handle -->
  <line x1="392" y1="392" x2="448" y2="448" stroke="#1D4ED8" stroke-width="20" stroke-linecap="round"/>
</svg>
