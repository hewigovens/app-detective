name: AppDetective

options:
    createIntermediateGroups: true
    defaultConfig: Release

packages:
    DetectiveCore:
        path: Packages/DetectiveCore
    LSAppCategory:
        url: https://github.com/hewigovens/LSAppCategory.git
        revision: fe8edb78aaa41206e1a98b9bfbd0b0f26ed625c9
    Sparkle:
        url: https://github.com/sparkle-project/Sparkle
        from: "2.7.0"

settings:
    base:
        CURRENT_PROJECT_VERSION: 7
        DEAD_CODE_STRIPPING: YES
        DEVELOPMENT_TEAM: V28VJH6B6S
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        MARKETING_VERSION: 1.4.1
        STRING_CATALOG_GENERATE_SYMBOLS: YES

targets:
    AppDetective:
        type: application
        platform: macOS
        deploymentTarget: "14.6"
        sources:
            - path: AppDetective
        dependencies:
            - package: DetectiveCore
            - package: LSAppCategory
            - package: Sparkle
              product: Sparkle
            - target: appdetective-cli
              embed: true
              codeSign: true
              copy:
                  destination: resources
        info:
            path: Info.plist
            properties:
                SUFeedURL: https://raw.githubusercontent.com/hewigovens/app-detective/main/docs/appcast.xml
                SUPublicEDKey: UOMJSZnts1cRolglWcFAcibe9T9dD9flzz7fAQ3jmoQ=
                SUEnableAutomaticChecks: true
                SUAutomaticallyUpdate: false
        settings:
            base:
                ASSETCATALOG_COMPILER_APPICON_NAME: app
                CODE_SIGN_ENTITLEMENTS: AppDetective/AppDetective.entitlements
                DEAD_CODE_STRIPPING: YES
                DEVELOPMENT_ASSET_PATHS: '"AppDetective/Preview Content"'
                ENABLE_HARDENED_RUNTIME: YES
                INFOPLIST_KEY_CFBundleDisplayName: AppDetective
                GENERATE_INFOPLIST_FILE: YES
                INFOPLIST_KEY_LSHasLocalizedDisplayName: YES
                INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
                INFOPLIST_KEY_NSHumanReadableCopyright: ""
                PRODUCT_BUNDLE_IDENTIFIER: dev.hewig.AppDetective
    appdetective-cli:
        type: tool
        platform: macOS
        deploymentTarget: "14.6"
        sources:
            - path: CLI
        dependencies:
            - package: DetectiveCore
            - package: LSAppCategory
        settings:
            base:
                PRODUCT_NAME: appdetective
                CODE_SIGN_STYLE: Automatic
                CODE_SIGN_IDENTITY: "-"
                ENABLE_HARDENED_RUNTIME: NO
                # Don't archive the standalone tool — it's embedded inside AppDetective.app/Contents/Resources.
                # Without this, xcodebuild archive emits Products/usr/local/bin/appdetective and Xcode's
                # distribution method manager rejects developer-id export on the mixed archive.
                SKIP_INSTALL: YES
                INSTALL_PATH: ""
    AppDetectiveTests:
        type: bundle.unit-test
        platform: macOS
        deploymentTarget: "26.0"
        sources:
            - path: AppDetectiveTests
        dependencies:
            - target: AppDetective
            - package: DetectiveCore
        settings:
            base:
                BUNDLE_LOADER: "$(TEST_HOST)"
                DEAD_CODE_STRIPPING: YES
                GENERATE_INFOPLIST_FILE: YES
                PRODUCT_BUNDLE_IDENTIFIER: dev.hewig.AppDetectiveTests
                TEST_HOST: "$(BUILT_PRODUCTS_DIR)/AppDetective.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/AppDetective"
    AppDetectiveUITests:
        type: bundle.ui-testing
        platform: macOS
        deploymentTarget: "14.6"
        sources:
            - path: AppDetectiveUITests
        dependencies:
            - target: AppDetective
        settings:
            base:
                DEAD_CODE_STRIPPING: YES
                GENERATE_INFOPLIST_FILE: YES
                PRODUCT_BUNDLE_IDENTIFIER: dev.hewig.AppDetectiveUITests
                TEST_TARGET_NAME: AppDetective

schemes:
    appdetective-cli:
        build:
            targets:
                appdetective-cli: all
        run:
            config: Debug
    AppDetective:
        build:
            targets:
                AppDetective: all
                AppDetectiveTests:
                    - test
        run:
            config: Debug
        test:
            config: Debug
            targets:
                - AppDetectiveTests
                - AppDetectiveUITests
        analyze:
            config: Debug
        archive:
            config: Release
        profile:
            config: Release
